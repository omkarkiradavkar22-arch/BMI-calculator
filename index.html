<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BMI calculator</title>
</head>
<link rel="stylesheet" href="index.css">
<body>
    <div class="container">
        <h1>BMI Calculator</h1>

        <input type="text" class="weight" placeholder="Enter Weight (kg)">

        <input type="text" class="height" placeholder="Enter Height (m)">

        <button type="submit" class="submit">Calculate BMI</button>

        <p>Your BMI</p>
        <span class="error"></span>
        <h1 class="output"></h1>

        <h2 class="bmi"></h2>
    </div>
    <script src="app.js"></script>
</body>       
</html>
